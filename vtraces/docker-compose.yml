name: yai-vtraces

services:
  vtraces:
    image: victoriametrics/victoria-traces:${VT_VERSION:-v0.8.2}
    container_name: yai-vtraces
    restart: unless-stopped
    ports:
      - "${VT_PORT:-21428}:10428"
    command:
      - "-storageDataPath=/vtraces-data"
    volumes:
      - ./data:/vtraces-data
    networks:
      - yai-infra
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:10428/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  yai-infra:
    external: true
