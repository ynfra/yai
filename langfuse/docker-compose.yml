name: yai-langfuse

# Langfuse v3 self-hosted observability stack.
# Six services: langfuse-web, langfuse-worker, postgres, clickhouse, minio, redis.
# Reference: https://langfuse.com/self-hosting/deployment/docker-compose
#
# yai conventions applied on top of upstream:
#   - Direct bind mounts (./data/...) instead of named volumes
#   - bitnami/minio:latest substituted for upstream's cgr.dev/chainguard/minio
#     (Bitnami is the yai default; see ../minio for the standalone bucket)
#   - ClickHouse pinned to a stable tag
#   - Only langfuse-web (23000) and langfuse-minio API (23090) reachable from
#     outside; everything else is internal-only or bound to 127.0.0.1

x-langfuse-env: &lf-env
  NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:23000}
  DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  SALT: ${SALT}
  ENCRYPTION_KEY: ${ENCRYPTION_KEY}
  TELEMETRY_ENABLED: "true"
  LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
  CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
  CLICKHOUSE_URL: http://clickhouse:8123
  CLICKHOUSE_USER: ${CLICKHOUSE_USER}
  CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
  CLICKHOUSE_CLUSTER_ENABLED: "false"
  LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
  LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
  LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
  LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
  LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
  LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
  LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
  LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
  LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
  LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
  LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
  # Media URLs are signed for browser fetches, so this endpoint must be
  # reachable from the user's machine — point at the host-exposed MinIO port.
  LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://localhost:${LANGFUSE_MINIO_API_PORT:-23090}
  LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
  LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_AUTH: ${REDIS_AUTH}
  # First-run bootstrap — ALL vars must be non-empty or the block is skipped
  LANGFUSE_INIT_ORG_ID: ${LANGFUSE_INIT_ORG_ID:-}
  LANGFUSE_INIT_ORG_NAME: ${LANGFUSE_INIT_ORG_NAME:-}
  LANGFUSE_INIT_PROJECT_ID: ${LANGFUSE_INIT_PROJECT_ID:-}
  LANGFUSE_INIT_PROJECT_NAME: ${LANGFUSE_INIT_PROJECT_NAME:-}
  LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_INIT_PROJECT_PUBLIC_KEY:-}
  LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_INIT_PROJECT_SECRET_KEY:-}
  LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL:-}
  LANGFUSE_INIT_USER_NAME: ${LANGFUSE_INIT_USER_NAME:-}
  LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD:-}
  LANGFUSE_LLM_CONNECTION_WHITELISTED_HOST: localhost,host.docker.internal
  LANGFUSE_LLM_CONNECTION_WHITELISTED_IPS: 127.0.0.1,::1
  # Optional SMTP for user invitations / password resets
  EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-}
  SMTP_CONNECTION_URL: ${SMTP_CONNECTION_URL:-}

services:
  langfuse-worker:
    image: docker.io/langfuse/langfuse-worker:${LANGFUSE_VERSION:-3}
    container_name: yai-langfuse-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      # Internal-only — worker exposes /api/health and metrics on 3030.
      - "127.0.0.1:23030:3030"
    extra_hosts:
      - host.docker.internal:host-gateway
    environment:
      <<: *lf-env
      HOSTNAME: "0.0.0.0"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3030/api/health 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  langfuse-web:
    image: docker.io/langfuse/langfuse:${LANGFUSE_VERSION:-3}
    container_name: yai-langfuse-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - "${LANGFUSE_WEB_PORT:-23000}:3000"
    extra_hosts:
      - host.docker.internal:host-gateway
    environment:
      <<: *lf-env
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      HOSTNAME: "0.0.0.0"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/api/public/health 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  clickhouse:
    # Pinned to a known-good stable tag. Upstream Langfuse tracks the latest
    # 24.x line; bump cautiously and check the Langfuse changelog first.
    image: clickhouse/clickhouse-server:${CLICKHOUSE_VERSION:-24.12-alpine}
    container_name: yai-langfuse-clickhouse
    restart: unless-stopped
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    volumes:
      - ./data/clickhouse/data:/var/lib/clickhouse
      - ./data/clickhouse/logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8123/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio:
    # Using quay.io/minio/minio (last stable: RELEASE.2025-09-07T16-13-09Z).
    # Bitnami dropped the :latest tag; quay.io stopped updates when the
    # minio/minio repo was archived 2026-04-25 — same last release either way.
    image: ${MINIO_IMAGE:-quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z}
    container_name: yai-langfuse-minio
    restart: unless-stopped
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      # API port is reachable from the host because media-upload URLs are
      # signed against this endpoint and fetched by the user's browser.
      - "${LANGFUSE_MINIO_API_PORT:-23090}:9000"
      # Console only loopback.
      - "127.0.0.1:23091:9001"
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  createbuckets:
    image: ${MINIO_IMAGE:-quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z}
    container_name: yai-langfuse-createbuckets
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        mc mb --ignore-existing local/langfuse &&
        echo 'Bucket langfuse ready.'
      "
    restart: "no"

  redis:
    image: redis:${REDIS_VERSION:-7-alpine}
    container_name: yai-langfuse-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_AUTH}
      --maxmemory-policy noeviction
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_AUTH}", "--no-auth-warning", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:${POSTGRES_VERSION:-17.10}
    container_name: yai-langfuse-postgres
    restart: unless-stopped
    shm_size: 1g
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: UTC
      PGTZ: UTC
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 10
