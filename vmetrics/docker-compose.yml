name: yai-vmetrics

# VictoriaMetrics single-node with built-in Prometheus-compatible scraper.
# Pass -promscrape.config to enable scraping without a separate vmagent process.

services:
  vmetrics:
    image: victoriametrics/victoria-metrics:${VM_VERSION:-v1.146.0}
    container_name: yai-vmetrics
    restart: unless-stopped
    ports:
      - "${VM_PORT:-28428}:8428"
    command:
      - "-storageDataPath=/vm-data"
      - "-retentionPeriod=${VM_RETENTION:-12}"
      - "-promscrape.config=/etc/vmetrics/promscrape.yml"
    volumes:
      - ./data:/vm-data
      - ./promscrape.yml:/etc/vmetrics/promscrape.yml:ro
    networks:
      - yai-infra
    extra_hosts:
      # So the built-in scraper can reach /metrics endpoints on the host
      # (other yai services published on host ports).
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8428/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  yai-infra:
    external: true
