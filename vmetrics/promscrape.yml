# Prometheus scrape config for VictoriaMetrics' built-in scraper.
#
# VictoriaMetrics single-node runs this scraper in-process via -promscrape.config.
# No separate vmagent needed.
#
# Obs-stack peers (vlogs) are reached by container name on yai-infra.
# Sibling yai services are scraped via host.docker.internal:<host_port>.
#
# After editing, reload with:
#   ./yai.sh restart vmetrics
# Check scrape health at: http://localhost:28428/targets

global:
  scrape_interval: 30s

scrape_configs:
  # --- Obs stack (reached by container name on yai-infra) --------------------
  - job_name: 'vmetrics_metrics'
    static_configs:
      - targets: ['localhost:8428']

  - job_name: 'vlogs_metrics'
    static_configs:
      - targets: ['yai-vlogs:9428']

  - job_name: 'vtraces_metrics'
    static_configs:
      - targets: ['yai-vtraces:10428']

  - job_name: 'postgres'
    static_configs:
      - targets: ['yai-pg-exporter:9630']

  - job_name: 'grafana_metrics'
    metrics_path: /metrics
    static_configs:
      - targets: ['yai-grafana:3000']

  - job_name: 'vector_metrics'
    metrics_path: /metrics
    static_configs:
      - targets: ['yai-vector:9598']

  - job_name: 'node_exporters'
    static_configs:
      - targets: ['yai-node-exporter:9100']

  - job_name: 'traefik_metrics'
    metrics_path: /metrics
    static_configs:
      - targets: ['yai-traefik:8080']

  # --- Sibling yai services (scraped via host gateway) -----------------------
  - job_name: 'qdrant'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:26000']

  - job_name: 'litellm'
    metrics_path: /metrics/
    static_configs:
      - targets: ['host.docker.internal:24000']

  - job_name: 'langfuse-web'
    metrics_path: /api/public/metrics
    static_configs:
      - targets: ['host.docker.internal:23000']

  - job_name: 'n8n'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:26002']

  # windmill CE exposes metrics on port 8001 (Enterprise Edition only);
  # port 28000 is the web UI. Scraping disabled until EE metrics are available.
  # - job_name: 'windmill'
  #   metrics_path: /metrics
  #   static_configs:
  #     - targets: ['host.docker.internal:28001']

  - job_name: 'minio_metrics'
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ['host.docker.internal:25000']

  - job_name: 'minio_bucket_metrics'
    metrics_path: /minio/v2/metrics/bucket
    static_configs:
      - targets: ['host.docker.internal:25000']
