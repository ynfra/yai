name: yai-minio

services:
  minio:
    image: ${MINIO_IMAGE:-pgsty/minio:RELEASE.2026-04-17T00-00-00Z}
    container_name: yai-minio
    restart: unless-stopped
    command: server /data --console-address :9001
    ports:
      - "${MINIO_API_PORT:-25000}:9000"
      - "${MINIO_CONSOLE_PORT:-25001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_PROMETHEUS_AUTH_TYPE: ${MINIO_PROMETHEUS_AUTH_TYPE:-public}
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio-init:
    image: ${MINIO_MC_IMAGE:-minio/mc:RELEASE.2025-04-03T17-07-56Z}
    container_name: yai-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      # MC_HOST_<alias> lets mc authenticate without a separate 'mc alias set' call
      MC_HOST_local: http://${MINIO_ROOT_USER}:${MINIO_ROOT_PASSWORD}@minio:9000
      MINIO_DEFAULT_BUCKETS: ${MINIO_DEFAULT_BUCKETS:-yai}
    entrypoint: >
      /bin/sh -c "
        for b in $$(echo $$MINIO_DEFAULT_BUCKETS | tr ',' ' '); do
          mc mb --ignore-existing local/$$b && echo \"bucket ready: $$b\";
        done
      "
    restart: "no"
