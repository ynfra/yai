name: yai-postgres

services:
  postgres:
    image: postgres:${POSTGRES_VERSION:-17.10}
    container_name: yai-postgres
    restart: unless-stopped
    shm_size: 1g
    ports:
      - "${POSTGRES_PORT:-25432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ:-UTC}
      PGTZ: ${TZ:-UTC}
    volumes:
      - ./data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  pg_exporter:
    image: vonng/pg_exporter:${PG_EXPORTER_VERSION:-latest}
    container_name: yai-pg-exporter
    restart: unless-stopped
    environment:
      PG_EXPORTER_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      PG_EXPORTER_AUTO_DISCOVER_DATABASES: "true"
      PG_EXPORTER_EXCLUDE_DATABASES: "template0,template1"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - yai-infra

networks:
  yai-infra:
    external: true
