name: yai-qdrant

services:
  qdrant:
    image: qdrant/qdrant:${QDRANT_VERSION:-v1.17.0}
    container_name: yai-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_PORT:-26000}:6333"
      - "${QDRANT_GRPC_PORT:-26001}:6334"
    environment:
      # API key — only set when QDRANT_API_KEY is non-empty so that an empty
      # value in .env does not accidentally enable locked-down auth mode.
      QDRANT__TELEMETRY_DISABLED: "true"
    volumes:
      - ./data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
