<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yai — AI infrastructure</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #21262d;
      --border:    #30363d;
      --border2:   #21262d;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --subtle:    #484f58;
      --link:      #58a6ff;
      --radius:    10px;

      --c-llm:      #a371f7;
      --c-workflow: #3fb950;
      --c-data:     #e3b341;
      --c-browser:  #58a6ff;
      --c-obs:      #56d364;

      --c-llm-bg:      rgba(163,113,247,.12);
      --c-workflow-bg: rgba(63,185,80,.12);
      --c-data-bg:     rgba(227,179,65,.12);
      --c-browser-bg:  rgba(88,166,255,.12);
      --c-obs-bg:      rgba(86,211,100,.12);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      padding: 2rem 2rem 1.75rem;
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .brand { display: flex; align-items: baseline; gap: 0.6rem; }
    .brand-name {
      font-size: 1.625rem;
      font-weight: 700;
      letter-spacing: -0.04em;
    }
    .brand-name em { font-style: normal; color: var(--link); }
    .brand-tag {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0;
    }
    .header-meta {
      font-size: 0.75rem;
      color: var(--subtle);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .header-meta code {
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 0.15em 0.45em;
      border-radius: 5px;
      font-size: 0.6875rem;
      color: var(--muted);
    }

    /* ── Main ── */
    .main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* ── Section ── */
    .section { margin-bottom: 2.25rem; }
    .section-label {
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--subtle);
      margin-bottom: 0.875rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border2);
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(268px, 1fr));
      gap: 0.875rem;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.125rem 1.25rem 1.125rem;
      display: flex;
      flex-direction: column;
      gap: 0.625rem;
      transition: border-color 0.12s ease, background 0.12s ease;
    }
    .card:hover { border-color: var(--subtle); background: var(--surface2); }

    .card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .card-icon { font-size: 1.375rem; line-height: 1; flex-shrink: 0; }
    .card-badge {
      font-size: 0.625rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 0.2em 0.55em;
      border-radius: 999px;
      white-space: nowrap;
      margin-top: 0.1rem;
    }
    .badge-llm      { color: var(--c-llm);      background: var(--c-llm-bg); }
    .badge-workflow { color: var(--c-workflow);  background: var(--c-workflow-bg); }
    .badge-data     { color: var(--c-data);      background: var(--c-data-bg); }
    .badge-browser  { color: var(--c-browser);   background: var(--c-browser-bg); }
    .badge-obs      { color: var(--c-obs);        background: var(--c-obs-bg); }

    .card-name { font-size: 0.9375rem; font-weight: 600; color: var(--text); }

    .card-desc {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.55;
      flex: 1;
    }

    .card-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      margin-top: 0.25rem;
    }
    .card-port {
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 0.6875rem;
      color: var(--subtle);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 0.2em 0.55em;
      border-radius: 5px;
      user-select: all;
      cursor: text;
    }
    .card-open {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--link);
      text-decoration: none;
      padding: 0.3em 0.7em;
      border: 1px solid rgba(88,166,255,.25);
      border-radius: 6px;
      transition: background 0.1s, border-color 0.1s;
    }
    .card-open:hover {
      background: rgba(88,166,255,.1);
      border-color: rgba(88,166,255,.45);
    }
    .card-open svg { width: 11px; height: 11px; flex-shrink: 0; }

    /* ── Traefik hint ── */
    .card-traefik {
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 0.6rem;
      color: var(--subtle);
      border-top: 1px solid var(--border2);
      padding-top: 0.5rem;
      margin-top: 0.125rem;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      cursor: text;
      user-select: all;
      transition: color 0.1s;
    }
    .card-traefik:hover { color: var(--muted); }

    /* ── Footer ── */
    .footer {
      border-top: 1px solid var(--border);
      padding: 1.25rem 2rem;
      text-align: center;
    }
    .footer-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      font-size: 0.6875rem;
      color: var(--subtle);
      flex-wrap: wrap;
    }
    .footer-inner a { color: var(--subtle); text-decoration: none; }
    .footer-inner a:hover { color: var(--muted); }
    .footer-sep { opacity: 0.4; }

    @media (max-width: 600px) {
      .header { padding: 1.25rem 1rem 1rem; }
      .main   { padding: 1.25rem 1rem; }
      .grid   { grid-template-columns: 1fr; }
      .header-meta { display: none; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="brand">
      <h1 class="brand-name"><em>y</em>ai</h1>
      <span class="brand-tag">self-hosted AI infrastructure</span>
    </div>
    <div class="header-meta">
      manage with <code>./yai.sh</code>
      <span class="footer-sep">·</span>
      Traefik proxy on <code id="traefik-port">:27000</code>
    </div>
  </div>
</header>

<main class="main" id="main"></main>

<footer class="footer">
  <div class="footer-inner">
    <span>Traefik dashboard <a id="traefik-link" href="http://yai.orb.local:27001" target="_blank">yai.orb.local:27001</a></span>
    <span class="footer-sep">·</span>
    <span><code>*.yai.orb.local</code> routes via Traefik</span>
    <span class="footer-sep">·</span>
    <a href="https://github.com/ynfra/yai" target="_blank" rel="noopener">github.com/ynfra/yai</a>
  </div>
</footer>

<script>
(function () {
  const HOST     = window.location.hostname || 'localhost';
  const TPORT    = 80;   // Traefik HTTP entrypoint
  const API_PORT = 27001;

  // Traefik route base: omit :80 since browsers default to port 80
  function traefikBase(subdomain) {
    return 'http://' + subdomain + '.localhost';
  }

  // Update footer/header with current host
  document.getElementById('traefik-port').textContent = ':80';
  const tLink = document.getElementById('traefik-link');
  tLink.href = 'http://' + HOST + ':' + API_PORT;
  tLink.textContent = HOST + ':' + API_PORT;

  const GROUPS = [
    { id: 'llm',      label: 'LLM' },
    { id: 'workflow', label: 'Workflows' },
    { id: 'data',     label: 'Data' },
    { id: 'browser',  label: 'Browser' },
    { id: 'obs',      label: 'Observability' },
  ];

  const SERVICES = [
    // LLM
    {
      id: 'litellm', name: 'LiteLLM', icon: '⚡', group: 'llm', port: 24000,
      desc: 'OpenAI-compatible LLM gateway. Model routing, virtual keys, spend tracking.',
    },
    {
      id: 'langfuse', name: 'Langfuse', icon: '🔭', group: 'llm', port: 23000,
      desc: 'LLM observability. Traces, evaluations, prompt management, datasets.',
    },

    // Workflows
    {
      id: 'n8n', name: 'n8n', icon: '🔄', group: 'workflow', port: 26002,
      desc: 'Visual workflow automation. 400+ integrations, queue mode with workers.',
    },
    {
      id: 'windmill', name: 'Windmill', icon: '🌀', group: 'workflow', port: 28000,
      desc: 'Script & workflow engine. Python, TypeScript, Go. Scheduled jobs.',
    },

    // Data
    {
      id: 'qdrant', name: 'Qdrant', icon: '🔮', group: 'data', port: 26000,
      desc: 'Vector database for RAG and embeddings. REST and gRPC API.',
    },
    {
      id: 'minio', name: 'MinIO', icon: '🗄️', group: 'data', port: 25001,
      desc: 'S3-compatible object storage. Buckets, policies, lifecycle rules.',
    },
    {
      id: 'postgres', name: 'Postgres', icon: '🐘', group: 'data', port: 25432,
      desc: 'Shared PostgreSQL 17. Used by LiteLLM and ad-hoc workloads.',
      noProxy: true,
    },

    // Browser
    {
      id: 'browserless', name: 'Browserless', icon: '🌐', group: 'browser', port: 26003, path: '/debugger/',
      desc: 'Headless Chromium API. Puppeteer, Playwright, CDP. Stateless workers.',
    },
    {
      id: 'firecrawl', name: 'Firecrawl', icon: '🕷️', group: 'browser', port: 21000,
      desc: 'Web scraping & crawling API. Clean markdown output, built-in queues.',
    },

    // Observability
    {
      id: 'grafana', name: 'Grafana', icon: '📊', group: 'obs', port: 22000,
      desc: 'Dashboards for metrics, logs, and traces from the yai-infra stack.',
    },
    {
      id: 'vmetrics', name: 'VictoriaMetrics', icon: '📈', group: 'obs', port: 28428,
      desc: 'Metrics store with built-in scraper. PromQL / MetricsQL query API.',
    },
    {
      id: 'vlogs', name: 'VictoriaLogs', icon: '📋', group: 'obs', port: 29428,
      desc: 'Log store with LogsQL query language. Loki-compatible push API.',
    },
    {
      id: 'vtraces', name: 'VictoriaTraces', icon: '🔍', group: 'obs', port: 21428,
      desc: 'Trace store (OTLP ingest). Jaeger-compatible query API.',
    },
  ];

  function badgeLabel(g) {
    return { llm: 'LLM', workflow: 'Workflow', data: 'Data', browser: 'Browser', obs: 'Obs' }[g] || g;
  }

  function cardFixed(svc) {
    const url  = 'http://' + HOST + ':' + svc.port + (svc.path || '');
    const traefikHint = svc.noProxy ? '' :
      '<div class="card-traefik">' + svc.id + '.yai.orb.local</div>';
    return '<div class="card">' +
      '<div class="card-head">' +
        '<span class="card-icon">' + svc.icon + '</span>' +
        '<span class="card-badge badge-' + svc.group + '">' + badgeLabel(svc.group) + '</span>' +
      '</div>' +
      '<div class="card-name">' + svc.name + '</div>' +
      '<div class="card-desc">' + svc.desc + '</div>' +
      '<div class="card-foot">' +
        '<span class="card-port">:' + svc.port + '</span>' +
        '<a class="card-open" href="' + url + '" target="_blank" rel="noopener">' +
          'Open ' +
          '<svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">' +
            '<path d="M3.75 2h3.5a.75.75 0 0 1 0 1.5h-3.5a.25.25 0 0 0-.25.25v8.5c0 .138.112.25.25.25h8.5a.25.25 0 0 0 .25-.25v-3.5a.75.75 0 0 1 1.5 0v3.5A1.75 1.75 0 0 1 12.25 14h-8.5A1.75 1.75 0 0 1 2 12.25v-8.5C2 2.784 2.784 2 3.75 2Zm6.854-1h4.146a.25.25 0 0 1 .25.25v4.146a.25.25 0 0 1-.427.177L13.03 4.03 9.28 7.78a.751.751 0 0 1-1.042-.018.751.751 0 0 1-.018-1.042l3.75-3.75-1.543-1.543A.25.25 0 0 1 10.604 1Z"/>' +
          '</svg>' +
        '</a>' +
      '</div>' +
      traefikHint +
    '</div>';
  }

  const main = document.getElementById('main');
  GROUPS.forEach(function (g) {
    const svcs = SERVICES.filter(function (s) { return s.group === g.id; });
    if (!svcs.length) return;
    main.innerHTML +=
      '<section class="section">' +
        '<h2 class="section-label">' + g.label + '</h2>' +
        '<div class="grid">' + svcs.map(cardFixed).join('') + '</div>' +
      '</section>';
  });
})();
</script>

</body>
</html>
