name: yai-vlogs

services:
  vlogs:
    image: victoriametrics/victoria-logs:${VL_VERSION:-v1.50.0}
    container_name: yai-vlogs
    restart: unless-stopped
    ports:
      - "${VL_PORT:-29428}:9428"
    command:
      - "-storageDataPath=/vlogs-data"
    volumes:
      - ./data:/vlogs-data
    networks:
      - yai-infra
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9428/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  yai-infra:
    external: true
